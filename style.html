<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar HTML & CSS</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="container">

        <!-- Navigation -->
        <nav>
            <a href="#">Home</a>
            <a href="#">Produk</a>
            <a href="#">Tentang</a>
            <a href="#">Kontak</a>
        </nav>

        <!-- Typography -->
        <div class="card">
            <h1>Belajar HTML & CSS</h1>

            <h2>Typography</h2>

            <p>
                Ini adalah contoh paragraf menggunakan CSS sederhana.
            </p>
        </div>

        <!-- Button -->
        <div class="card">

            <h2>Button</h2>

            <button>Simpan</button>

            <button>Hapus</button>

        </div>

        <!-- Form -->
        <div class="card">

            <h2>Form</h2>

            <label>Nama</label>
            <input type="text">

            <label>Email</label>
            <input type="email">

            <label>Pesan</label>
            <textarea></textarea>

            <br><br>

            <button>Kirim</button>

        </div>

        <!-- Table -->
        <div class="card">

            <h2>Table</h2>

            <table>

                <tr>
                    <th>Nama</th>
                    <th>Kelas</th>
                    <th>Status</th>
                </tr>

                <tr>
                    <td>Andi</td>
                    <td>Frontend</td>
                    <td>Aktif</td>
                </tr>

                <tr>
                    <td>Budi</td>
                    <td>Backend</td>
                    <td>Aktif</td>
                </tr>

                <tr>
                    <td>Citra</td>
                    <td>UI/UX</td>
                    <td>Aktif</td>
                </tr>

            </table>

        </div>

        <!-- Card -->
        <div class="card">

            <h2>Card</h2>

            <p>
                Card digunakan untuk mengelompokkan informasi agar tampilan lebih rapi.
            </p>

        </div>

    </div>

</body>

</html>
