<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Admin Tests</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Tests</h1>
      <nav aria-label="Admin tests navigation">
        <a href="../dashboard.html">Dashboard</a>
        <a href="create.html">Create</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Daftar Tests</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Judul</th>
              <th>Mentor</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td data-label="Judul">HTML Basic Test</td>
              <td data-label="Mentor">Mentor 1</td>
              <td data-label="Status"><span class="badge badge-published">Published</span></td>
            </tr>
            <tr>
              <td data-label="Judul">CSS Basic Test</td>
              <td data-label="Mentor">Mentor 2</td>
              <td data-label="Status"><span class="badge badge-draft">Draft</span></td>
            </tr>
            <tr>
              <td data-label="Judul">Responsive Design Test</td>
              <td data-label="Mentor">Mentor 1</td>
              <td data-label="Status"><span class="badge badge-archived">Archived</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Bootcamp Seed Level - Frontend</p>
    </div>
  </footer>
</body>

</html>
