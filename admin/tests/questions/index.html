<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Admin Questions</title>
  <link rel="stylesheet" href="../../../assets/css/style.css">
</head>

<body>

  <div class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <h1>Flotest</h1>
        <p class="subtitle">
          Flow Through Every Assessment
        </p>
      </div>

      <div class="navigation">
        <a class="btn-nav" href="../../dashboard.html">Dashboard</a>
        <a class="btn-nav" href="../../users/index.html">Users</a>
        <a class="btn-nav btn-nav-active" href="../index.html">Tests</a>
        <a class="btn-nav" href="../../../index.html">Logout</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">

      <div class="card-header">
        <h2>Daftar Questions</h2>

        <a class="btn btn-primary" href="create.html">
          Tambah Question
        </a>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Pertanyaan</th>
              <th>Tipe</th>
              <th>Aksi</th>
            </tr>
          </thead>

          <tbody>

            <tr>
              <td data-label="No">1</td>
              <td data-label="Pertanyaan">Apa kepanjangan HTML?</td>
              <td data-label="Tipe">Multiple Choice</td>
              <td data-label="Aksi">
                <div class="table-actions">
                  <a class="btn btn-edit" href="edit.html">Edit</a>
                  <button class="btn btn-delete" type="button">
                    Hapus
                  </button>
                </div>
              </td>
            </tr>

            <tr>
              <td data-label="No">2</td>
              <td data-label="Pertanyaan">Tag untuk paragraf adalah?</td>
              <td data-label="Tipe">Multiple Choice</td>
              <td data-label="Aksi">
                <div class="table-actions">
                  <a class="btn btn-edit" href="edit.html">Edit</a>
                  <button class="btn btn-delete" type="button">
                    Hapus
                  </button>
                </div>
              </td>
            </tr>

          </tbody>
        </table>
      </div>

    </div>
  </div>

  <div class="site-footer">
    <div class="container">
      <p>Bootcamp Seed Level - Frontend</p>
    </div>
  </div>

</body>

</html>
