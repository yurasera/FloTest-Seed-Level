<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Edit Test</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Edit Test</h1>
      <nav aria-label="Admin tests edit navigation">
        <a href="index.html">Back</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Ubah Test</h2>
      <form>
        <div class="form-group">
          <label for="title">Judul</label>
          <input id="title" type="text" name="title" value="HTML Basic Test">
        </div>
        <div class="form-group">
          <label for="description">Deskripsi</label>
          <textarea id="description" name="description" rows="5">Tes dasar HTML.</textarea>
        </div>
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option>Draft</option>
            <option selected>Published</option>
            <option>Archived</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">Update</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Bootcamp Seed Level - Frontend</p>
    </div>
  </footer>
</body>

</html>
