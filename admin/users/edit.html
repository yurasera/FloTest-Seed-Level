<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Edit User</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Edit User</h1>
      <nav aria-label="Admin users edit navigation">
        <a href="index.html">Back</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Ubah User</h2>
      <form>
        <div class="form-group">
          <label for="name">Nama</label>
          <input id="name" type="text" name="name" value="Mentor 1">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" value="mentor1@flotest.local">
        </div>
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" name="role">
            <option>Admin</option>
            <option selected>Mentor</option>
            <option>Menti</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">Update</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Bootcamp Seed Level - Frontend</p>
    </div>
  </footer>
</body>

</html>
