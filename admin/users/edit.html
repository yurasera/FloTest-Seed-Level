<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Edit User</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>

  <div class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <h1>Flotest</h1>
        <p class="subtitle">
          Flow Through Every Assessment
        </p>
      </div>

      <div class="navigation">
        <a class="btn-nav" href="../dashboard.html">Dashboard</a>
        <a class="btn-nav btn-nav-active" href="index.html">Users</a>
        <a class="btn-nav" href="../tests/index.html">Tests</a>
        <a class="btn-nav" href="../../index.html">Logout</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2>Edit User</h2>

      <form>
        <div class="form-group">
          <label for="name">Nama</label>
          <input id="name" type="text" name="name" value="Mentor 1">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" value="mentor1@flotest.local">
        </div>

        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" name="role">
            <option>Admin</option>
            <option selected>Mentor</option>
            <option>Menti</option>
          </select>
        </div>

        <div class="form-actions">
          <a class="btn btn-secondary" href="index.html">Kembali</a>

          <button class="btn btn-primary" type="submit">
            Update
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="site-footer">
    <div class="container">
      <p>Bootcamp Seed Level - Frontend</p>
    </div>
  </div>

</body>

</html>
