<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Admin Users</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Users</h1>
      <nav aria-label="Admin users navigation">
        <a href="../dashboard.html">Dashboard</a>
        <a href="create.html">Create</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Daftar Users</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nama</th>
              <th>Email</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td data-label="Nama">Admin 1</td>
              <td data-label="Email">admin@flotest.local</td>
              <td data-label="Role"><span class="badge badge-admin">Admin</span></td>
            </tr>
            <tr>
              <td data-label="Nama">Mentor 1</td>
              <td data-label="Email">mentor1@flotest.local</td>
              <td data-label="Role"><span class="badge badge-mentor">Mentor</span></td>
            </tr>
            <tr>
              <td data-label="Nama">Menti 1</td>
              <td data-label="Email">menti1@flotest.local</td>
              <td data-label="Role"><span class="badge badge-menti">Menti</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>FloTest HTML & CSS MVP</p>
    </div>
  </footer>
</body>
</html>
