<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Edit User</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Edit User</h1>
      <nav aria-label="Admin navigation">
        <a href="../dashboard.html">Dashboard</a>
        <a href="index.html">Users</a>
        <a href="../tests/index.html">Tests</a>
        <a href="../index.html">Logout</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="button-group mb-2">
      <a class="btn" href="index.html">Kembali</a>
    </div>

    <section class="card">
      <h2>Ubah User</h2>
      <p>Data user telah diisi sebagai contoh untuk proses edit.</p>
      <form>
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" name="name" value="Mentor 1" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" value="mentor1@flotest.local" required>
        </div>
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="admin">Admin</option>
            <option value="mentor" selected>Mentor</option>
            <option value="menti">Menti</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">Update</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>FloTest HTML & CSS MVP</p>
    </div>
  </footer>
</body>
</html>
