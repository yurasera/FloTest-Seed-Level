<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Create Question</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>

<body>

    <div class="site-header">
        <div class="container header-inner">
            <h1>Create Question</h1>

            <div class="navigation">
                <a class="btn-nav" href="../../dashboard.html">Dashboard</a>
                <a class="btn-nav btn-nav-active" href="../index.html">Tests</a>
                <a class="btn-nav" href="../../../index.html">Logout</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Tambah Question</h2>

            <form>
                <div class="form-group">
                    <label for="question">Pertanyaan</label>
                    <textarea id="question" name="question" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label for="option-a">Opsi A</label>
                    <input id="option-a" type="text" name="option-a">
                </div>

                <div class="form-group">
                    <label for="option-b">Opsi B</label>
                    <input id="option-b" type="text" name="option-b">
                </div>

                <div class="form-group">
                    <label for="option-c">Opsi C</label>
                    <input id="option-c" type="text" name="option-c">
                </div>

                <div class="form-group">
                    <label for="option-d">Opsi D</label>
                    <input id="option-d" type="text" name="option-d">
                </div>

                <div class="form-actions">
                    <a class="btn btn-secondary" href="index.html">Kembali</a>
                    <button class="btn btn-primary" type="submit">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div class="site-footer">
        <div class="container">
            <p>Bootcamp Seed Level - Frontend</p>
        </div>
    </div>

</body>

</html>
