<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Mentor Edit Question</title>
  <link rel="stylesheet" href="../../../assets/css/style.css">
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Edit Question</h1>
      <nav aria-label="Mentor questions edit navigation">
        <a href="index.html">Back</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Ubah Question</h2>
      <form>
        <div class="form-group">
          <label for="question">Pertanyaan</label>
          <textarea id="question" name="question" rows="4">Apa kepanjangan HTML?</textarea>
        </div>
        <div class="form-group">
          <label for="option-a">Opsi A</label>
          <input id="option-a" type="text" name="option-a" value="HyperText Markup Language">
        </div>
        <div class="form-group">
          <label for="option-b">Opsi B</label>
          <input id="option-b" type="text" name="option-b" value="High Text Markup Language">
        </div>
        <div class="form-group">
          <label for="option-c">Opsi C</label>
          <input id="option-c" type="text" name="option-c" value="Home Tool Markup Language">
        </div>
        <div class="form-group">
          <label for="option-d">Opsi D</label>
          <input id="option-d" type="text" name="option-d" value="Hyper Tool Model Language">
        </div>
        <button class="btn btn-primary" type="submit">Update</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Bootcamp Seed Level - Frontend</p>
    </div>
  </footer>
</body>

</html>
