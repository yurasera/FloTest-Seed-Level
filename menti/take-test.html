<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Take Test</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Take Test</h1>
      <nav aria-label="Menti take test navigation">
        <a href="dashboard.html">Back</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Kerjakan Tes</h2>
      <p>Nama Tes: HTML Basic Test</p>
      <p>Nomor Soal: 1 / 10</p>
      <section class="card inner-card">
        <h3>Pertanyaan</h3>
        <p>Apa kepanjangan dari HTML?</p>
        <form>
          <div class="form-group">
            <label><input type="radio" name="answer"> A. HyperText Markup Language</label>
          </div>
          <div class="form-group">
            <label><input type="radio" name="answer"> B. High Tech Modern Language</label>
          </div>
          <div class="form-group">
            <label><input type="radio" name="answer"> C. Home Tool Markup Language</label>
          </div>
          <div class="form-group">
            <label><input type="radio" name="answer"> D. Hyper Text Machine Language</label>
          </div>
          <div class="button-group">
            <button class="btn" type="button">Sebelumnya</button>
            <button class="btn" type="button">Selanjutnya</button>
            <button class="btn btn-primary" type="submit">Submit</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>FloTest HTML & CSS MVP</p>
    </div>
  </footer>
</body>
</html>
