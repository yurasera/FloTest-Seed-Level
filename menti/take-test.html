<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Take Test</title>
  <link rel="stylesheet" href="../assets/css/test.css">
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <h1>Flotest</h1>
        <p class="subtitle">
          Flow Through Every Assessment
        </p>
      </div>
      <div class="navigation">
        <a class="btn-nav" href="dashboard.html">Dashboard</a>
        <a class="btn-nav btn-nav-active" href="take-test.html">Take Test</a>
        <a class="btn-nav" href="../index.html">Logout</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">

      <h2>Kerjakan Tes</h2>

      <p>
        Nama Tes: HTML Basic Test
      </p>

      <p>
        Nomor Soal: 1 / 10
      </p>


      <div class="progress-wrapper">

        <div class="progress-info">
          <span>Progress</span>
          <span>10%</span>
        </div>

        <div class="progress-bar">
          <div class="progress-value"></div>
        </div>

      </div>


      <div class="card inner-card">

        <h3>Pertanyaan</h3>

        <p>
          Apa kepanjangan dari HTML?
        </p>


        <form action="result.html" method="GET">

          <div class="form-group answer-option">

            <label>
              <input type="radio" name="answer" value="A" onchange="this.form.submit()">

              A. HyperText Markup Language

            </label>

          </div>


          <div class="form-group answer-option">

            <label>
              <input type="radio" name="answer" value="B" onchange="this.form.submit()">

              B. High Tech Modern Language

            </label>

          </div>


          <div class="form-group answer-option">

            <label>
              <input type="radio" name="answer" value="C" onchange="this.form.submit()">

              C. Home Tool Markup Language

            </label>

          </div>


          <div class="form-group answer-option">

            <label>
              <input type="radio" name="answer" value="D" onchange="this.form.submit()">

              D. Hyper Text Machine Language

            </label>

          </div>


        </form>


        <div class="button-group">

          <button class="btn" type="button">
            Sebelumnya
          </button>


          <button class="btn btn-primary" type="button">
            Selanjutnya
          </button>

        </div>


      </div>


    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Bootcamp Seed Level - Frontend</p>
    </div>
  </footer>
</body>

</html>
