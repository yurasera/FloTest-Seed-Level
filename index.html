<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="container">

        <div class="logo-header">
            <div class="logo">
                F
            </div>
            <h1>FloTest</h1>
        </div>

        <div class="card">

            <h2>Login</h2>

            <form>

                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="nama@email.com"
                >

                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                >

                <br><br>

                <a class="btn" href="admin/dashboard.html">
                    Login sebagai Admin
                </a>

                <a class="btn" href="mentor/dashboard.html">
                    Login sebagai Mentor
                </a>

                <a class="btn" href="menti/dashboard.html">
                    Login sebagai Menti
                </a>

            </form>

        </div>

        <p>Bootcamp Seed Level - Frontend</p>

    </div>

</body>

</html>
