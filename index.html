<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="login-container">

        <div class="card login-card">

            <div class="logo-header">

                <div class="logo">
                    F
                </div>

                <div class="brand">
                    <h1>FloTest</h1>

                    <p class="subtitle">
                        Flow Through Every Assessment
                    </p>
                </div>

            </div>

            <h2>Login</h2>

            <form>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="nama@email.com"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                    >
                </div>

                <div class="form-actions-vertical">

                    <a class="btn btn-primary" href="admin/dashboard.html">
                        Login sebagai Admin
                    </a>

                    <a class="btn btn-secondary" href="mentor/dashboard.html">
                        Login sebagai Mentor
                    </a>

                    <a class="btn btn-secondary" href="menti/dashboard.html">
                        Login sebagai Menti
                    </a>

                </div>

            </form>

        </div>

        <div class="site-footer">
            <p>Bootcamp Seed Level - Frontend</p>
        </div>

    </div>

</body>

</html>
